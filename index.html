<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OffVideos</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
    }

    body {
        background: #0f1117;
        color: white;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .container {
        width: 90%;
        max-width: 1000px;
        text-align: center;
    }

    h1 {
        font-size: 52px;
        margin-bottom: 10px;
    }

    .subtitle {
        color: #9aa4b2;
        margin-bottom: 30px;
    }

    .search-box {
        display: flex;
        gap: 10px;
        margin-bottom: 25px;
    }

    input {
        flex: 1;
        padding: 15px;
        border: none;
        border-radius: 12px;
        background: #1a1f2b;
        color: white;
        font-size: 16px;
        outline: none;
    }

    button {
        padding: 15px 25px;
        border: none;
        border-radius: 12px;
        background: #4f8cff;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        background: #6ca0ff;
    }

    .video-container {
        width: 100%;
        aspect-ratio: 16/9;
        background: #000;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 0 30px rgba(0,0,0,0.5);
    }

    iframe {
        width: 100%;
        height: 100%;
        border: none;
    }

    .footer {
        margin-top: 20px;
        color: #687385;
        font-size: 14px;
    }
</style>
</head>

<body>

<div class="container">
    <h1>OffVideos</h1>
    <div class="subtitle">
        Assista vídeos do YouTube com menos distrações.
    </div>

    <div class="search-box">
        <input type="text" id="videoURL" placeholder="Cole o link do YouTube aqui...">
        <button onclick="loadVideo()">Assistir</button>
    </div>

    <div class="video-container">
        <iframe id="player"
        src=""
        allowfullscreen>
        </iframe>
    </div>

    <div class="footer">
        OffVideos • Rodando localmente via file://
    </div>
</div>

<script>
function extractVideoID(url) {

    let regex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&\?]+)/;

    let match = url.match(regex);

    if (match && match[1]) {
        return match[1];
    }

    return null;
}

function loadVideo() {

    let url = document.getElementById("videoURL").value;

    let videoID = extractVideoID(url);

    if (videoID) {

        let embedURL =
            "https://www.youtube.com/embed/" +
            videoID +
            "?rel=0&modestbranding=1&autoplay=1";

        document.getElementById("player").src = embedURL;

    } else {

        alert("Link inválido.");

    }
}
</script>

</body>
</html>
